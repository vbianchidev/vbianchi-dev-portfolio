<section class="hero">
  <h1>{{ 'HERO.TITLE' | translate }} <span class="highlight">Vitor Bianchi</span>.</h1>
  <p class="hero__sub">{{ 'HERO.SUBTITLE' | translate }}</p>
</section>

<section class="projects">
  <h2 class="projects__title">GitHub</h2>
  <div class="projects__grid">
    @for (project of projects; track project.url) {
      <a class="project-card" [href]="project.url" target="_blank" rel="noopener">
        <div class="project-card__icon" [ngClass]="'project-card__icon--' + project.type">
          <i [class]="iconMap[project.type]"></i>
        </div>
        <div class="project-card__body">
          <span class="project-card__type">{{ labelMap[project.type] }}</span>
          <h3 class="project-card__name">{{ project.name }}</h3>
          <p class="project-card__desc">{{ project.desc }}</p>
        </div>
        <i class="fa-solid fa-arrow-up-right-from-square project-card__arrow"></i>
      </a>
    }
  </div>
</section>

<section class="projects">
  <h2 class="projects__title">Figma</h2>

  <div class="projects__grid">
    <iframe
      style="border: 1px solid rgba(0, 0, 0, 0.1)"
      width="100%"
      height="450"
      src="https://embed.figma.com/design/yB1xdqLvKIPH2Xh3wOPKFn/SPELLBOOK-MVP?embed-host=share"
      allowfullscreen
    ></iframe>
  </div>
</section>
