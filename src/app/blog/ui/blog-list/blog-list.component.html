<h1>{{ 'BLOG' | translate }}</h1>

<section class="blog">
  <ul class="blog__post-list">
    @for (post of posts(); track $index) {
      <li class="post-card">
        <span class="post-card__date">
          {{ post.date | date: 'dd/MM/yyyy' }}
        </span>

        <a [routerLink]="['/blog', post.slug]">
          <h2>{{ post.title }}</h2>
        </a>

        <p>{{ post.summary }}</p>
      </li>
    } @empty {
      <li>No posts!</li>
    }
  </ul>
</section>
